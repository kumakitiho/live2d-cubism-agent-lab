$schema: https://json-schema.org/draft/2020-12/schema
title: Live2D generative inpainting result
type: object
additionalProperties: false
$defs:
  quality_metrics:
    type: object
    additionalProperties: false
    required:
      - white_halo_px
      - transparent_hole_px
      - overlap_deficit_px
      - preserve_region_difference_score
      - edge_extension_difference_score
      - inpaint_region_source_difference_score
      - inpaint_outside_difference_score
      - edge_continuity_score
      - boundary_color_difference_score
      - visual_reconstruction_difference_score
      - protect_difference_px
      - inpaint_outside_difference_px
      - alpha_continuity_score
      - surrounding_palette_consistency_score
      - visual_reconstruction_score
      - canvas_match
      - origin_match
      - alpha_valid
    properties:
      white_halo_px: {type: integer, minimum: 0}
      transparent_hole_px: {type: integer, minimum: 0}
      overlap_deficit_px: {type: integer, minimum: 0}
      preserve_region_difference_score: {type: number, minimum: 0, maximum: 1}
      edge_extension_difference_score: {type: number, minimum: 0, maximum: 1}
      inpaint_region_source_difference_score: {type: number, minimum: 0, maximum: 1}
      inpaint_outside_difference_score: {type: number, minimum: 0, maximum: 1}
      edge_continuity_score: {type: number, minimum: 0, maximum: 1}
      boundary_color_difference_score: {type: number, minimum: 0, maximum: 1}
      visual_reconstruction_difference_score: {type: number, minimum: 0, maximum: 1}
      protect_difference_px: {type: integer, minimum: 0}
      inpaint_outside_difference_px: {type: integer, minimum: 0}
      alpha_continuity_score: {type: number, minimum: 0, maximum: 1}
      surrounding_palette_consistency_score: {type: number, minimum: 0, maximum: 1}
      visual_reconstruction_score: {type: number, minimum: 0, maximum: 1}
      canvas_match: {type: boolean}
      origin_match: {type: boolean}
      alpha_valid: {type: boolean}
  candidate:
    type: object
    additionalProperties: false
    required:
      - candidate_id
      - output_file
      - preview_file
      - output_sha256
      - preview_sha256
      - seed
      - backend
      - model_id
      - model_revision
      - inference_steps
      - guidance_scale
      - strength
      - crop_box
      - padding
      - resize_from
      - resize_to
      - quality_metrics
      - quality_status
      - requires_review
      - rejection_reasons
    properties:
      candidate_id: {type: string, minLength: 1}
      output_file: {type: string, pattern: '\.[Pp][Nn][Gg]$'}
      preview_file: {type: string, pattern: '\.[Pp][Nn][Gg]$'}
      output_sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
      preview_sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
      seed: {type: integer, minimum: 0}
      backend: {enum: [mock, diffusers, flux_fill]}
      model_id: {type: [string, 'null']}
      model_revision: {type: [string, 'null']}
      inference_steps: {type: integer, minimum: 1}
      guidance_scale: {type: number, minimum: 0}
      strength: {type: [number, 'null'], minimum: 0}
      crop_box:
        type: array
        minItems: 4
        maxItems: 4
        items: {type: integer, minimum: 0}
      padding: {type: integer, minimum: 0}
      resize_from:
        type: array
        minItems: 2
        maxItems: 2
        items: {type: integer, minimum: 1}
      resize_to:
        type: array
        minItems: 2
        maxItems: 2
        items: {type: integer, minimum: 1}
      quality_metrics: {$ref: '#/$defs/quality_metrics'}
      quality_status: {enum: [pass, fail]}
      requires_review: {const: true}
      rejection_reasons:
        type: array
        uniqueItems: true
        items: {type: string, minLength: 1}
  summary:
    type: object
    additionalProperties: false
    required: [candidate_count, passed_candidates, failed_candidates, selection_created]
    properties:
      candidate_count: {type: integer, minimum: 1}
      passed_candidates: {type: integer, minimum: 0}
      failed_candidates: {type: integer, minimum: 0}
      selection_created: {const: false}
required:
  - schema_version
  - project
  - run_id
  - layer_id
  - status
  - derived_from_request
  - source_image
  - current_part
  - masks
  - backend
  - backend_status
  - backend_config
  - canvas
  - inferred
  - review_required
  - candidates
  - summary
properties:
  schema_version: {const: 1}
  project: {type: string, minLength: 1}
  run_id: {type: string, minLength: 1}
  layer_id: {type: string, minLength: 1}
  status: {const: completed}
  derived_from_request: {type: string, minLength: 1}
  source_image: {type: string, minLength: 1}
  current_part: {type: string, minLength: 1}
  masks:
    type: object
    additionalProperties: false
    required: [target_mask, protect_mask, edge_extension_mask, inpaint_mask, generation_permission]
    properties:
      target_mask: {type: string, minLength: 1}
      protect_mask: {type: string, minLength: 1}
      edge_extension_mask: {type: string, minLength: 1}
      inpaint_mask: {type: string, minLength: 1}
      generation_permission: {const: inpaint_mask_only}
  backend: {enum: [mock, diffusers, flux_fill]}
  backend_status:
    type: object
    additionalProperties: false
    required: [name, available, detail]
    properties:
      name: {enum: [mock, diffusers, flux_fill]}
      available: {type: boolean}
      detail: {type: string, minLength: 1}
  backend_config: {type: object}
  canvas:
    type: object
    additionalProperties: false
    required: [width, height, origin]
    properties:
      width: {type: integer, minimum: 1}
      height: {type: integer, minimum: 1}
      origin:
        type: array
        prefixItems: [{const: 0}, {const: 0}]
        minItems: 2
        maxItems: 2
  inferred: {const: true}
  review_required: {const: true}
  candidates:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/candidate'}
  summary: {$ref: '#/$defs/summary'}
