$schema: https://json-schema.org/draft/2020-12/schema
title: Review-gated Live2D segmentation assignment plan
type: object
additionalProperties: false
required:
  - schema_version
  - project
  - derived_from
  - segmentation_run_id
  - review_status
  - assignments
  - summary
properties:
  schema_version: {const: 1}
  project: {type: string, minLength: 1}
  derived_from:
    type: object
    additionalProperties: false
    required:
      - asset_generation_queue
      - segmentation_ranked
      - asset_generation_queue_sha256
      - asset_generation_queue_content_sha256
      - source_image_sha256
    properties:
      asset_generation_queue: {type: string, minLength: 1}
      segmentation_ranked: {type: string, minLength: 1}
      asset_generation_queue_sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
      asset_generation_queue_content_sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
      source_image_sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
  segmentation_run_id: {type: string, minLength: 1}
  review_status: {enum: [pending, approved]}
  assignments:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - layer_id
        - selected_candidate_id
        - alternative_candidate_ids
        - target_mask
        - protect_mask
        - edge_extension_mask
        - inpaint_mask
        - confidence
        - status
        - requires_review
        - review_reasons
        - derivation
        - segmentation_backend
        - segmentation_model_id
        - segmentation_model_revision
        - segmentation_run_id
        - segmentation_confidence
      properties:
        layer_id: {type: string, minLength: 1}
        selected_candidate_id: {type: string, minLength: 1}
        alternative_candidate_ids:
          type: array
          uniqueItems: true
          items: {type: string, minLength: 1}
        target_mask: {type: string, minLength: 1}
        protect_mask: {type: string, minLength: 1}
        edge_extension_mask: {type: string, minLength: 1}
        inpaint_mask: {type: string, minLength: 1}
        confidence: {type: number, minimum: 0, maximum: 1}
        status: {enum: [needs_review, approved, rejected]}
        requires_review: {type: boolean}
        review_reasons:
          type: array
          uniqueItems: true
          items: {type: string, minLength: 1}
        derivation:
          type: object
          additionalProperties: false
          required:
            - target_mask
            - protect_mask
            - edge_extension_mask
            - inpaint_mask
            - edge_extension_is_inpaint
          properties:
            target_mask: {type: string, minLength: 1}
            protect_mask: {type: string, minLength: 1}
            edge_extension_mask: {type: string, minLength: 1}
            inpaint_mask: {type: string, minLength: 1}
            edge_extension_is_inpaint: {const: false}
        segmentation_backend: {enum: [mock, sam2, grounded-sam2]}
        segmentation_model_id: {type: [string, 'null']}
        segmentation_model_revision: {type: [string, 'null']}
        segmentation_run_id: {type: string, minLength: 1}
        segmentation_confidence: {type: number, minimum: 0, maximum: 1}
  summary:
    type: object
    additionalProperties: false
    required: [assignment_count, all_assignments_require_review, canonical_queue_modified]
    properties:
      assignment_count: {type: integer, minimum: 0}
      all_assignments_require_review: {const: true}
      canonical_queue_modified: {const: false}
