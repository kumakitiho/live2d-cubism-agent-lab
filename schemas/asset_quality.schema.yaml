$schema: https://json-schema.org/draft/2020-12/schema
title: Live2D pre-Cubism asset quality report
type: object
additionalProperties: false
required:
  - schema_version
  - project
  - derived_from
  - source_image
  - reconstructed_source
  - difference_image
  - parts
  - thresholds
  - summary
properties:
  schema_version:
    const: 2
  project: {type: string, minLength: 1}
  derived_from:
    type: object
    additionalProperties: false
    required: [mask_manifest, asset_generation_queue]
    properties:
      mask_manifest: {type: string, minLength: 1}
      asset_generation_queue: {type: string, minLength: 1}
  source_image: {type: string, minLength: 1}
  reconstructed_source: {type: string, minLength: 1}
  difference_image: {type: string, minLength: 1}
  parts:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [layer_id, quality_status, allowed_change_region, metrics, failed_checks]
      properties:
        layer_id: {type: string, minLength: 1}
        quality_status: {enum: [pass, fail]}
        allowed_change_region:
          type: object
          additionalProperties: false
          required: [edge_extension_mask, inpaint_mask, pixel_count]
          properties:
            edge_extension_mask: {type: string, minLength: 1}
            inpaint_mask: {type: string, minLength: 1}
            pixel_count: {type: integer, minimum: 0}
        metrics:
          type: object
          additionalProperties: false
          required:
            - white_halo_px
            - transparent_hole_px
            - overlap_deficit_px
            - preserve_region_difference_score
            - edge_extension_difference_score
            - inpaint_region_source_difference_score
            - inpaint_outside_difference_score
            - edge_continuity_score
            - boundary_color_difference_score
            - visual_reconstruction_difference_score
          properties:
            white_halo_px: {type: integer, minimum: 0}
            transparent_hole_px: {type: integer, minimum: 0}
            overlap_deficit_px: {type: integer, minimum: 0}
            preserve_region_difference_score: {type: number, minimum: 0, maximum: 1}
            edge_extension_difference_score: {type: number, minimum: 0, maximum: 1}
            inpaint_region_source_difference_score: {type: number, minimum: 0, maximum: 1}
            inpaint_outside_difference_score: {type: number, minimum: 0, maximum: 1}
            edge_continuity_score: {type: number, minimum: 0, maximum: 1}
            boundary_color_difference_score: {type: number, minimum: 0, maximum: 1}
            visual_reconstruction_difference_score: {type: number, minimum: 0, maximum: 1}
        failed_checks:
          type: array
          uniqueItems: true
          items:
            enum:
              - white_halo_px
              - transparent_hole_px
              - overlap_deficit_px
              - preserve_region_difference_score
              - edge_extension_difference_score
              - inpaint_outside_difference_score
              - edge_continuity_score
              - boundary_color_difference_score
              - visual_reconstruction_difference_score
  thresholds:
    type: object
    additionalProperties: false
    required:
      - max_white_halo_px
      - max_transparent_hole_px
      - max_overlap_deficit_px
      - max_preserve_region_difference_score
      - max_edge_extension_difference_score
      - max_inpaint_outside_difference_score
      - max_edge_continuity_score
      - max_boundary_color_difference_score
      - max_visual_reconstruction_difference_score
    properties:
      max_white_halo_px: {type: integer, minimum: 0}
      max_transparent_hole_px: {type: integer, minimum: 0}
      max_overlap_deficit_px: {type: integer, minimum: 0}
      max_preserve_region_difference_score: {const: 0}
      max_edge_extension_difference_score: {type: number, minimum: 0, maximum: 1}
      max_inpaint_outside_difference_score: {const: 0}
      max_edge_continuity_score: {type: number, minimum: 0, maximum: 1}
      max_boundary_color_difference_score: {type: number, minimum: 0, maximum: 1}
      max_visual_reconstruction_difference_score: {type: number, minimum: 0, maximum: 1}
  summary:
    type: object
    additionalProperties: false
    required: [total_parts, failed_parts, result, visual_reconstruction_difference_score]
    properties:
      total_parts: {type: integer, minimum: 0}
      failed_parts: {type: integer, minimum: 0}
      result: {enum: [pass, fail]}
      visual_reconstruction_difference_score: {type: number, minimum: 0, maximum: 1}
