schema_version: 1
validation_mode: strict
project: replace-me
source_stage: live2d-cubism-workflow
model_refs:
  model_import_psd: generated/model_import.psd
  layer_map: generated/layer_map.yaml
  action_plan_report: outputs/action_plan_report.md
checks:
  - id: eye-blink
    category: eye
    target_layer_ids: [eye_white_L, eye_white_R]
    required: true
    status: not_run
    evidence:
      kind: parameter_probe
      path: outputs/action_plan_report.md
      description: ParamEyeLOpenとParamEyeROpenの確認結果を記録する
    issue_type: null
    severity: null
    requested_action: null
  - id: mouth-open-close
    category: mouth
    target_layer_ids: [mouth_inner]
    required: true
    status: not_run
    evidence:
      kind: parameter_probe
      path: outputs/action_plan_report.md
      description: ParamMouthOpenYの確認結果を記録する
    issue_type: null
    severity: null
    requested_action: null
  - id: mesh-deformation
    category: mesh
    target_layer_ids: [face_hidden_fill]
    required: true
    status: not_run
    evidence:
      kind: screenshot
      path: outputs/mesh_evaluation.png
      description: 変形時の欠け、交差、未塗り領域を確認する
    issue_type: null
    severity: null
    requested_action: null
  - id: texture-integrity
    category: texture
    target_layer_ids: [hair_back]
    required: true
    status: not_run
    evidence:
      kind: screenshot
      path: outputs/texture_evaluation.png
      description: テクスチャ欠け、透明境界、色ずれを確認する
    issue_type: null
    severity: null
    requested_action: null
summary:
  result: incomplete
